<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeBasic — Battle Simulator</title>

    <!-- SEO -->
    <meta name="description" content="PokeBasic Battle Simulator — pit Pokémon against each other, analyze type matchups, move effectiveness, win probability, and get switch suggestions.">
    <meta name="keywords" content="pokemon battle simulator, type matchup, move effectiveness, competitive pokemon, pokemon damage calculator">
    <meta name="author" content="PokeBasic">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PokeBasic — Battle Simulator">
    <meta property="og:description" content="Simulate Pokémon battles: analyze type matchups, move effectiveness, win probability, and get competitive switch suggestions.">
    <meta property="og:image" content="/icon.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="PokeBasic — Battle Simulator">
    <meta name="twitter:description" content="Simulate Pokémon battles: analyze type matchups, move effectiveness, win probability, and get competitive switch suggestions.">
    <meta name="twitter:image" content="/icon.png">

    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="module" src="/src/battle.ts"></script>
</head>

<body class="bg-slate-50 min-h-screen">
<div x-data="battleSimulator">

    <!-- ══════════ HEADER ══════════ -->
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-screen-2xl mx-auto px-5 py-3 flex items-center gap-4 flex-wrap">

            <!-- Back link -->
            <a href="./index.html"
                class="flex items-center gap-1.5 text-sm font-bold text-slate-500 hover:text-violet-600 transition shrink-0">
                ← Back to PokeBasic
            </a>

            <!-- Title -->
            <div class="flex items-center gap-2 shrink-0">
                <span class="text-xl">⚔️</span>
                <span class="font-black text-slate-800 text-base">Battle Simulator (Beta)</span>
            </div>

            <!-- Mode tabs -->
            <div class="flex items-center gap-1 ml-2">
                <template x-for="m in ['1v1','2v2','6v6']" :key="m">
                    <button :class="mode === m ? 'tab-active' : 'tab-inactive'"
                        class="px-4 py-1.5 font-bold text-sm rounded-lg transition"
                        @click="setMode(m)" x-text="m"></button>
                </template>
            </div>

            <!-- Reset -->
            <button @click="resetAll()"
                class="ml-auto px-4 py-1.5 rounded-lg border border-slate-200 font-bold text-sm text-slate-500 hover:text-red-500 hover:border-red-200 transition">
                ↺ Reset
            </button>
        </div>
    </header>

    <!-- ══════════ BATTLE LAYOUT ══════════ -->
    <main class="max-w-screen-2xl mx-auto px-4 py-5 flex flex-col gap-5">

        <!-- ── Analysis (full width, 3-panel) ── -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
            <h2 class="font-black text-slate-800 text-sm mb-4">📊 Analysis</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-0 divide-y md:divide-y-0 md:divide-x divide-slate-100">

                <!-- LEFT: My Moves vs Enemy -->
                <div class="pb-4 md:pb-0 md:pr-6">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">My Moves vs Enemy</h3>
                    <template x-if="mySlots[0]?.selectedMoves.some(Boolean) && enemySlots[0]?.pokemon">
                        <div class="space-y-2">
                            <template x-for="mv in mySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                <div class="flex items-center gap-2">
                                    <span class="flex-1 text-xs font-semibold text-slate-700 capitalize" x-text="mv.name.replace(/-/g,' ')"></span>
                                    <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                        :style="`background:${typeColor(mv.type.name)}`" x-text="mv.type.name"></span>
                                    <span class="text-xs font-black px-2 py-0.5 rounded min-w-7 text-center"
                                        :class="effChipClass(effectiveness(mv.type.name, enemySlots[0].pokemon.types.map(t=>t.type.name)))"
                                        x-text="effChipLabel(effectiveness(mv.type.name, enemySlots[0].pokemon.types.map(t=>t.type.name)))"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="!mySlots[0]?.selectedMoves.some(Boolean) || !enemySlots[0]?.pokemon">
                        <p class="text-xs text-slate-400 italic">Load both Pokémon and select moves</p>
                    </template>
                </div>

                <!-- MIDDLE: Win Probability (top) + Switch Suggestion (bottom) -->
                <div class="py-4 md:py-0 md:px-6 flex flex-col gap-4">
                    <!-- Win Probability -->
                    <div>
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Win Probability</h3>
                        <template x-if="mySlots[0]?.pokemon && enemySlots[0]?.pokemon">
                            <div>
                                <div class="flex items-center justify-between text-xs font-bold mb-1.5">
                                    <span class="text-violet-600 capitalize" x-text="mySlots[0].pokemon?.name ?? 'Mine'"></span>
                                    <span class="text-rose-500 capitalize" x-text="enemySlots[0].pokemon?.name ?? 'Enemy'"></span>
                                </div>
                                <div class="h-4 rounded-full overflow-hidden flex">
                                    <div class="bg-violet-400 h-full transition-all duration-500" :style="`width:${winPct}%`"></div>
                                    <div class="bg-rose-400 h-full flex-1 transition-all duration-500"></div>
                                </div>
                                <div class="flex justify-between text-[10px] font-bold mt-1">
                                    <span class="text-violet-500" x-text="winPct.toFixed(0)+'%'"></span>
                                    <span class="text-rose-500" x-text="(100-winPct).toFixed(0)+'%'"></span>
                                </div>
                            </div>
                        </template>
                        <template x-if="!mySlots[0]?.pokemon || !enemySlots[0]?.pokemon">
                            <p class="text-xs text-slate-400 italic">Load both Pokémon to see probability</p>
                        </template>
                    </div>

                    <div class="border-t border-slate-100"></div>

                    <!-- Switch Suggestion -->
                    <div>
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Switch Suggestion</h3>
                        <template x-if="switchSuggestion">
                            <div x-ref="suggestionCard" class="rounded-xl bg-violet-50 border border-violet-200 p-3">
                                <p class="font-black text-violet-700 text-xs leading-relaxed" x-text="switchSuggestion"></p>
                            </div>
                        </template>
                        <template x-if="!switchSuggestion">
                            <p class="text-xs text-slate-400 italic">No better switch available</p>
                        </template>
                    </div>
                </div>

                <!-- RIGHT: Enemy Moves vs Me -->
                <div class="pt-4 md:pt-0 md:pl-6">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Enemy Moves vs Me</h3>
                    <template x-if="enemySlots[0]?.selectedMoves.some(Boolean) && mySlots[0]?.pokemon">
                        <div class="space-y-2">
                            <template x-for="mv in enemySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                <div class="flex items-center gap-2">
                                    <span class="flex-1 text-xs font-semibold text-slate-700 capitalize" x-text="mv.name.replace(/-/g,' ')"></span>
                                    <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                        :style="`background:${typeColor(mv.type.name)}`" x-text="mv.type.name"></span>
                                    <span class="text-xs font-black px-2 py-0.5 rounded min-w-7 text-center"
                                        :class="effChipClass(effectiveness(mv.type.name, mySlots[0].pokemon.types.map(t=>t.type.name)))"
                                        x-text="effChipLabel(effectiveness(mv.type.name, mySlots[0].pokemon.types.map(t=>t.type.name)))"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="!enemySlots[0]?.selectedMoves.some(Boolean) || !mySlots[0]?.pokemon">
                        <p class="text-xs text-slate-400 italic">Enemy moves auto-fill on select</p>
                    </template>
                </div>

            </div>
        </section>

        <!-- ── 3-column layout: My Team | Arena | Enemy Team ── -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 items-start">

            <!-- ── LEFT: My Team ── -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col gap-4">
                <h2 class="font-black text-slate-800 text-sm">🧩 My Team</h2>

                <template x-for="(slot, i) in mySlots.slice(0, slotCount)" :key="i">
                    <div class="battle-slot-card rounded-xl border p-3 flex flex-col gap-3 cursor-grab active:cursor-grabbing transition-all duration-200"
                        :class="_dragOver === i ? 'border-violet-400 bg-violet-50 scale-[1.02]' : 'border-slate-200'"
                        draggable="true"
                        @dragstart="dragStart(i)"
                        @dragover.prevent="dragOver(i)"
                        @dragend="dragEnd()">

                        <!-- Search row -->
                        <div class="relative">
                            <input type="text"
                                :placeholder="`Slot ${i+1} — search Pokémon…`"
                                class="w-full pl-3 pr-4 py-2 text-sm border-2 rounded-lg focus:outline-none bg-slate-50 font-semibold text-slate-700 placeholder:font-normal placeholder:text-slate-400 transition-colors duration-300"
                                :style="`border-color:${slot.pokemon ? typeColor(slot.pokemon.types[0].type.name) : '#e2e8f0'}`"
                                x-model="slot.query"
                                @input="searchPokemon('my', i)"
                                autocomplete="off">
                            <!-- Autocomplete -->
                            <div class="ac-dropdown" x-show="slot.acOpen" x-cloak>
                                <template x-for="p in slot.acResults" :key="p.name">
                                    <div class="ac-item" @click="selectPokemon('my', i, p.name)">
                                        <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`" :alt="p.name">
                                        <span class="capitalize font-semibold text-sm text-slate-700" x-text="p.name"></span>
                                        <span class="text-slate-400 text-xs ml-auto" x-text="'#'+String(p.id).padStart(3,'0')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Pokemon card (when loaded) -->
                        <template x-if="slot.pokemon">
                            <div>
                                <!-- Sprite + name + types -->
                                <div class="flex items-center gap-3 mb-3">
                                    <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${slot.pokemon.id}.png`"
                                        class="w-14 h-14 object-contain" style="image-rendering:pixelated" :alt="slot.pokemon.name">
                                    <div>
                                        <p class="font-black text-slate-800 capitalize text-sm" x-text="slot.pokemon.name"></p>
                                        <div class="flex gap-1 mt-1 flex-wrap">
                                            <template x-for="t in slot.pokemon.types" :key="t.type.name">
                                                <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                    :style="`background:${typeColor(t.type.name)}`"
                                                    x-text="t.type.name"></span>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <!-- Move selects -->
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <template x-for="(_, mi) in [0,1,2,3]" :key="mi">
                                        <select class="text-xs border rounded-lg px-2 py-1.5 font-semibold text-slate-700 bg-white focus:outline-none transition-colors duration-200"
                                            :style="`border-color:${slot.selectedMoves[mi] ? typeColor(slot.selectedMoves[mi].type.name) : '#e2e8f0'}`"
                                            @change="selectMove('my', i, mi, $event.target.value)">
                                            <option value="">— Move —</option>
                                            <template x-for="mv in slot.moves" :key="mv.name">
                                                <option :value="mv.name"
                                                    :selected="slot.selectedMoves[mi]?.name === mv.name"
                                                    x-text="`${cap(mv.name.replace(/-/g,' '))} ${mv.power ? '('+mv.power+')' : ''}`"></option>
                                            </template>
                                        </select>
                                    </template>
                                </div>

                                <!-- Action buttons -->
                                <div class="flex gap-2">
                                    <button @click="bestMoves('my', i)"
                                        class="flex-1 text-xs font-bold px-2 py-1.5 rounded-lg bg-violet-50 text-violet-700 border border-violet-200 hover:bg-violet-100 transition">
                                        ⭐ Best
                                    </button>
                                    <button @click="randomMoves('my', i)"
                                        class="flex-1 text-xs font-bold px-2 py-1.5 rounded-lg bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100 transition">
                                        🎲 Random
                                    </button>
                                </div>
                            </div>
                        </template>

                        <!-- Loading indicator -->
                        <template x-if="slot.loading">
                            <div class="flex items-center gap-2 text-xs text-slate-400 font-semibold py-2">
                                <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-violet-500"></div>
                                Loading…
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <!-- ── CENTER: Battle Arena ── -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col gap-4">
                <h2 class="font-black text-slate-800 text-sm">⚔️ Battle Arena</h2>

                <!-- ── 1v1 Arena ── -->
                <div x-show="mode === '1v1'" class="flex flex-col gap-3">

                    <!-- Enemy lead -->
                    <div class="rounded-xl border-2 border-rose-100 bg-rose-50 p-4">
                        <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-2">Enemy</p>
                        <template x-if="enemySlots[0]?.pokemon">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <img :src="enemySlots[0].pokemon.sprites.other['official-artwork'].front_default || enemySlots[0].pokemon.sprites.front_default"
                                        class="enemy-lead-sprite w-20 h-20 object-contain drop-shadow-md" style="transform:scaleX(-1)"
                                        :alt="enemySlots[0].pokemon.name">
                                    <div class="flex-1">
                                        <p class="font-black text-slate-800 capitalize" x-text="enemySlots[0].pokemon.name"></p>
                                        <div class="flex gap-1 mt-1 flex-wrap">
                                            <template x-for="t in enemySlots[0].pokemon.types" :key="t.type.name">
                                                <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                    :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                            </template>
                                        </div>
                                        <!-- HP bar -->
                                        <div class="w-full bg-slate-200 rounded-full h-2 mt-2">
                                            <div class="h-full rounded-full transition-all duration-500" :class="hpColor(hpEnemy)" :style="`width:${hpEnemy}%`"></div>
                                        </div>
                                        <p class="text-[9px] text-slate-500 mt-0.5 font-semibold">
                                            HP <span x-text="hpEnemy"></span>%
                                            <template x-if="hpEnemy === 0"><span class="text-rose-500 font-black ml-1">Fainted!</span></template>
                                        </p>
                                    </div>
                                </div>
                                <!-- Enemy move buttons (click = enemy attacks you) -->
                                <div class="grid grid-cols-2 gap-1.5" x-show="enemySlots[0].selectedMoves.some(Boolean)">
                                    <template x-for="mv in enemySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                        <button class="text-[10px] font-bold px-2 py-1.5 rounded-lg text-white transition hover:opacity-80 text-left opacity-90"
                                            :style="`background:${typeColor(mv.type.name)}`"
                                            @click="useEnemyMove(mv)"
                                            x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template x-if="!enemySlots[0]?.pokemon">
                            <p class="text-slate-400 text-sm font-semibold italic">Search enemy on the right →</p>
                        </template>
                    </div>

                    <!-- Speed order + VS -->
                    <div class="flex flex-col items-center gap-1">
                        <template x-if="mySlots[0]?.pokemon && enemySlots[0]?.pokemon">
                            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500">
                                <span class="text-rose-400" x-text="(enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                                <span class="font-black text-slate-700 text-xs px-2 py-0.5 bg-amber-50 border border-amber-200 rounded-full"
                                    x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) >= (enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) ? '⚡ You First' : '⚡ Enemy First'">
                                </span>
                                <span class="text-violet-500" x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                            </div>
                        </template>
                        <div class="font-black text-slate-400 text-lg">VS</div>
                    </div>

                    <!-- My lead -->
                    <div class="rounded-xl border-2 border-violet-100 bg-violet-50 p-4">
                        <p class="text-[10px] font-black text-violet-400 uppercase tracking-widest mb-2">My Lead</p>
                        <template x-if="mySlots[0]?.pokemon">
                            <div class="flex items-center gap-3">
                                <img :src="mySlots[0].pokemon.sprites.other['official-artwork'].front_default || mySlots[0].pokemon.sprites.front_default"
                                    class="my-lead-sprite w-20 h-20 object-contain drop-shadow-md" :alt="mySlots[0].pokemon.name">
                                <div class="flex-1">
                                    <p class="font-black text-slate-800 capitalize" x-text="mySlots[0].pokemon.name"></p>
                                    <div class="flex gap-1 mt-1 flex-wrap">
                                        <template x-for="t in mySlots[0].pokemon.types" :key="t.type.name">
                                            <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                        </template>
                                    </div>
                                    <!-- HP bar -->
                                    <div class="w-full bg-slate-200 rounded-full h-2 mt-2 mb-0.5">
                                        <div class="h-full rounded-full transition-all duration-500" :class="hpColor(hpMy)" :style="`width:${hpMy}%`"></div>
                                    </div>
                                    <p class="text-[9px] text-slate-500 font-semibold mb-2">
                                        HP <span x-text="hpMy"></span>%
                                        <template x-if="hpMy === 0"><span class="text-rose-500 font-black ml-1">Fainted!</span></template>
                                    </p>
                                    <div class="grid grid-cols-2 gap-1.5">
                                        <template x-for="mv in mySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                            <button class="text-xs font-bold px-2 py-1.5 rounded-lg text-white transition hover:opacity-90 text-left"
                                                :style="`background:${typeColor(mv.type.name)}`"
                                                @click="useMove(mv)"
                                                x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <template x-if="!mySlots[0]?.pokemon">
                            <p class="text-slate-400 text-sm font-semibold italic">← Search a Pokémon on the left</p>
                        </template>
                    </div>
                </div>

                <!-- ── 2v2 Arena ── -->
                <div x-show="mode === '2v2'" class="flex flex-col gap-3">

                    <!-- Enemy row -->
                    <div class="grid grid-cols-2 gap-2">
                        <template x-for="(es, ei) in enemySlots.slice(0, 2)" :key="ei">
                            <div class="rounded-xl border-2 border-rose-100 bg-rose-50 p-3 flex flex-col gap-1">
                                <p class="text-[9px] font-black text-rose-400 uppercase tracking-widest">Enemy <span x-text="ei+1"></span></p>
                                <template x-if="es.pokemon">
                                    <div>
                                        <div class="text-center mb-1">
                                            <img :src="es.pokemon.sprites.other['official-artwork'].front_default || es.pokemon.sprites.front_default"
                                                class="w-14 h-14 object-contain drop-shadow-sm mx-auto" style="transform:scaleX(-1)"
                                                :alt="es.pokemon.name">
                                            <p class="font-black text-slate-800 capitalize text-xs mt-1" x-text="es.pokemon.name"></p>
                                            <div class="flex gap-1 mt-1 justify-center flex-wrap">
                                                <template x-for="t in es.pokemon.types" :key="t.type.name">
                                                    <span class="px-1.5 py-0.5 rounded-full text-white text-[9px] font-bold capitalize"
                                                        :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <!-- Enemy move buttons -->
                                        <div class="grid grid-cols-2 gap-1" x-show="es.selectedMoves.some(Boolean)">
                                            <template x-for="mv in es.selectedMoves.filter(Boolean)" :key="mv.name">
                                                <button class="text-[9px] font-bold px-1 py-1 rounded text-white hover:opacity-80 transition"
                                                    :style="`background:${typeColor(mv.type.name)}`"
                                                    @click="useEnemyMove(mv)"
                                                    x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="!es.pokemon">
                                    <p class="text-slate-400 text-xs italic text-center py-2">Empty</p>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Speed order + VS -->
                    <div class="flex flex-col items-center gap-1">
                        <template x-if="mySlots[0]?.pokemon && enemySlots[0]?.pokemon">
                            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500">
                                <span class="text-rose-400" x-text="(enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                                <span class="font-black text-slate-700 text-xs px-2 py-0.5 bg-amber-50 border border-amber-200 rounded-full"
                                    x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) >= (enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) ? '⚡ You First' : '⚡ Enemy First'">
                                </span>
                                <span class="text-violet-500" x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                            </div>
                        </template>
                        <div class="font-black text-slate-400 text-lg">VS</div>
                    </div>

                    <!-- My row -->
                    <div class="grid grid-cols-2 gap-2">
                        <template x-for="(ms, mi) in mySlots.slice(0, 2)" :key="mi">
                            <div class="rounded-xl border-2 border-violet-100 bg-violet-50 p-3 flex flex-col gap-1">
                                <p class="text-[9px] font-black text-violet-400 uppercase tracking-widest">Mine <span x-text="mi+1"></span></p>
                                <template x-if="ms.pokemon">
                                    <div>
                                        <div class="text-center mb-1">
                                            <img :src="ms.pokemon.sprites.other['official-artwork'].front_default || ms.pokemon.sprites.front_default"
                                                class="w-14 h-14 object-contain drop-shadow-sm mx-auto" :alt="ms.pokemon.name">
                                            <p class="font-black text-slate-800 capitalize text-xs mt-1" x-text="ms.pokemon.name"></p>
                                            <div class="flex gap-1 mt-1 justify-center flex-wrap">
                                                <template x-for="t in ms.pokemon.types" :key="t.type.name">
                                                    <span class="px-1.5 py-0.5 rounded-full text-white text-[9px] font-bold capitalize"
                                                        :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <!-- Move buttons for ALL slots -->
                                        <div class="grid grid-cols-2 gap-1" x-show="ms.selectedMoves.some(Boolean)">
                                            <template x-for="mv in ms.selectedMoves.filter(Boolean)" :key="mv.name">
                                                <button class="text-[9px] font-bold px-1 py-1 rounded text-white hover:opacity-90 transition"
                                                    :style="`background:${typeColor(mv.type.name)}`"
                                                    @click="useMove(mv)"
                                                    x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="!ms.pokemon">
                                    <p class="text-slate-400 text-xs italic text-center py-2">Empty</p>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ── 6v6 Arena ── -->
                <div x-show="mode === '6v6'" class="flex flex-col gap-3">

                    <!-- Enemy lead + bench -->
                    <div class="rounded-xl border-2 border-rose-100 bg-rose-50 p-4">
                        <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-2">Enemy Lead</p>
                        <template x-if="enemySlots[0]?.pokemon">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <img :src="enemySlots[0].pokemon.sprites.other['official-artwork'].front_default || enemySlots[0].pokemon.sprites.front_default"
                                        class="enemy-lead-sprite w-20 h-20 object-contain drop-shadow-md" style="transform:scaleX(-1)"
                                        :alt="enemySlots[0].pokemon.name">
                                    <div class="flex-1">
                                        <p class="font-black text-slate-800 capitalize" x-text="enemySlots[0].pokemon.name"></p>
                                        <div class="flex gap-1 mt-1 flex-wrap">
                                            <template x-for="t in enemySlots[0].pokemon.types" :key="t.type.name">
                                                <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                    :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                            </template>
                                        </div>
                                        <!-- HP bar -->
                                        <div class="w-full bg-slate-200 rounded-full h-2 mt-2">
                                            <div class="h-full rounded-full transition-all duration-500" :class="hpColor(hpEnemy)" :style="`width:${hpEnemy}%`"></div>
                                        </div>
                                        <p class="text-[9px] text-slate-500 mt-0.5 font-semibold">
                                            HP <span x-text="hpEnemy"></span>%
                                            <template x-if="hpEnemy === 0"><span class="text-rose-500 font-black ml-1">Fainted!</span></template>
                                        </p>
                                    </div>
                                </div>
                                <!-- Enemy move buttons -->
                                <div class="grid grid-cols-2 gap-1.5 mb-2" x-show="enemySlots[0].selectedMoves.some(Boolean)">
                                    <template x-for="mv in enemySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                        <button class="text-[10px] font-bold px-2 py-1.5 rounded-lg text-white transition hover:opacity-80 text-left opacity-90"
                                            :style="`background:${typeColor(mv.type.name)}`"
                                            @click="useEnemyMove(mv)"
                                            x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                    </template>
                                </div>
                                <!-- Enemy bench -->
                                <div class="flex gap-2 flex-wrap">
                                    <template x-for="(s, si) in enemySlots.slice(1, 6)" :key="si">
                                        <template x-if="s.pokemon">
                                            <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.pokemon.id}.png`"
                                                class="w-10 h-10 object-contain cursor-pointer hover:scale-110 transition rounded-lg bg-rose-100 p-0.5"
                                                style="image-rendering:pixelated" :title="s.pokemon.name"
                                                @click="swapEnemyLead(si+1)">
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template x-if="!enemySlots[0]?.pokemon">
                            <p class="text-slate-400 text-sm font-semibold italic">Search enemy on the right →</p>
                        </template>
                    </div>

                    <!-- Speed order + VS -->
                    <div class="flex flex-col items-center gap-1">
                        <template x-if="mySlots[0]?.pokemon && enemySlots[0]?.pokemon">
                            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500">
                                <span class="text-rose-400" x-text="(enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                                <span class="font-black text-slate-700 text-xs px-2 py-0.5 bg-amber-50 border border-amber-200 rounded-full"
                                    x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) >= (enemySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) ? '⚡ You First' : '⚡ Enemy First'">
                                </span>
                                <span class="text-violet-500" x-text="(mySlots[0].pokemon.stats.find(s=>s.stat.name==='speed')?.base_stat ?? 0) + ' SPD'"></span>
                            </div>
                        </template>
                        <div class="font-black text-slate-400 text-lg">VS</div>
                    </div>

                    <!-- My lead + bench -->
                    <div class="rounded-xl border-2 border-violet-100 bg-violet-50 p-4">
                        <p class="text-[10px] font-black text-violet-400 uppercase tracking-widest mb-2">My Lead</p>
                        <template x-if="mySlots[0]?.pokemon">
                            <div>
                                <div class="flex items-center gap-3">
                                    <img :src="mySlots[0].pokemon.sprites.other['official-artwork'].front_default || mySlots[0].pokemon.sprites.front_default"
                                        class="my-lead-sprite w-20 h-20 object-contain drop-shadow-md" :alt="mySlots[0].pokemon.name">
                                    <div class="flex-1">
                                        <p class="font-black text-slate-800 capitalize" x-text="mySlots[0].pokemon.name"></p>
                                        <div class="flex gap-1 mt-1 flex-wrap">
                                            <template x-for="t in mySlots[0].pokemon.types" :key="t.type.name">
                                                <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                    :style="`background:${typeColor(t.type.name)}`" x-text="t.type.name"></span>
                                            </template>
                                        </div>
                                        <!-- HP bar -->
                                        <div class="w-full bg-slate-200 rounded-full h-2 mt-2 mb-0.5">
                                            <div class="h-full rounded-full transition-all duration-500" :class="hpColor(hpMy)" :style="`width:${hpMy}%`"></div>
                                        </div>
                                        <p class="text-[9px] text-slate-500 font-semibold mb-2">
                                            HP <span x-text="hpMy"></span>%
                                            <template x-if="hpMy === 0"><span class="text-rose-500 font-black ml-1">Fainted!</span></template>
                                        </p>
                                        <div class="grid grid-cols-2 gap-1.5">
                                            <template x-for="mv in mySlots[0].selectedMoves.filter(Boolean)" :key="mv.name">
                                                <button class="text-xs font-bold px-2 py-1.5 rounded-lg text-white hover:opacity-90 transition text-left"
                                                    :style="`background:${typeColor(mv.type.name)}`"
                                                    @click="useMove(mv)"
                                                    x-text="cap(mv.name.replace(/-/g,' '))"></button>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                                <!-- My bench — click to swap lead -->
                                <div class="flex gap-2 mt-3 flex-wrap">
                                    <template x-for="(s, si) in mySlots.slice(1, 6)" :key="si">
                                        <template x-if="s.pokemon">
                                            <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.pokemon.id}.png`"
                                                class="w-10 h-10 object-contain cursor-pointer hover:scale-110 transition rounded-lg bg-violet-100 p-0.5"
                                                style="image-rendering:pixelated" :title="s.pokemon.name"
                                                @click="swapMyLead(si+1)">
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template x-if="!mySlots[0]?.pokemon">
                            <p class="text-slate-400 text-sm font-semibold italic">← Search a Pokémon on the left</p>
                        </template>
                    </div>
                </div>

                <!-- Full Turn button (shared) -->
                <template x-if="mySlots[0]?.selectedMoves.some(Boolean) && enemySlots[0]?.selectedMoves.some(Boolean) && hpMy > 0 && hpEnemy > 0">
                    <button @click="fullTurn()"
                        class="w-full font-black py-2.5 px-4 rounded-xl bg-linear-to-r from-emerald-500 to-teal-600 text-white hover:from-emerald-600 hover:to-teal-700 transition shadow-sm text-sm tracking-wide">
                        ⚔️ Execute Full Turn
                    </button>
                </template>

                <!-- Effectiveness result (shared across all modes) -->
                <div x-show="lastMove !== null" class="rounded-xl border border-slate-200 p-3">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-black text-sm text-slate-700" x-text="lastMove ? cap(lastMove.name.replace(/-/g,' ')) : ''"></span>
                        <span class="font-black text-sm" :class="effLabelClass" x-text="effLabel"></span>
                    </div>
                    <div class="h-3 rounded-full bg-slate-100 overflow-hidden">
                        <div id="eff-bar-fill" class="h-full rounded-full" :class="effBarClass" :style="`width:${effBarWidth}%`"></div>
                    </div>
                    <div id="dmg-label" class="text-center font-black text-violet-600 text-base mt-2" x-text="effLabel"></div>
                </div>

                <!-- Battle Log -->
                <div x-show="battleLog.length > 0" class="rounded-xl bg-slate-900 p-3">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-black text-white">📋 Battle Log</span>
                        <span class="text-[10px] font-bold text-slate-400">Turn <span x-text="turnCount"></span></span>
                    </div>
                    <div class="text-[10px] space-y-0.5 max-h-24 overflow-y-auto font-mono">
                        <template x-for="(entry, li) in battleLog.slice(-8)" :key="li">
                            <p class="text-slate-300 leading-relaxed" x-text="entry"></p>
                        </template>
                    </div>
                </div>
            </section>

            <!-- ── RIGHT: Enemy Team ── -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-black text-slate-800 text-sm">🗡️ Enemy Team</h2>
                    <button @click="randomEnemy()"
                        class="text-xs font-bold px-3 py-1.5 rounded-lg bg-rose-600 text-white hover:bg-rose-700 transition shrink-0">
                        🎲 Fill Random
                    </button>
                </div>

                <template x-for="(slot, i) in enemySlots.slice(0, slotCount)" :key="i">
                    <div class="rounded-xl border p-3 flex flex-col gap-3 transition-all duration-200 border-slate-200">

                        <!-- Search row -->
                        <div class="relative">
                            <input type="text"
                                :placeholder="`Slot ${i+1} — search Pokémon…`"
                                class="w-full pl-3 pr-4 py-2 text-sm border-2 rounded-lg focus:outline-none bg-slate-50 font-semibold text-slate-700 placeholder:font-normal placeholder:text-slate-400 transition-colors duration-300"
                                :style="`border-color:${slot.pokemon ? typeColor(slot.pokemon.types[0].type.name) : '#e2e8f0'}`"
                                x-model="slot.query"
                                @input="searchPokemon('enemy', i)"
                                autocomplete="off">
                            <!-- Autocomplete -->
                            <div class="ac-dropdown" x-show="slot.acOpen" x-cloak>
                                <template x-for="p in slot.acResults" :key="p.name">
                                    <div class="ac-item" @click="selectPokemon('enemy', i, p.name)">
                                        <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`" :alt="p.name">
                                        <span class="capitalize font-semibold text-sm text-slate-700" x-text="p.name"></span>
                                        <span class="text-slate-400 text-xs ml-auto" x-text="'#'+String(p.id).padStart(3,'0')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Pokemon card (when loaded) -->
                        <template x-if="slot.pokemon">
                            <div>
                                <!-- Sprite + name + types -->
                                <div class="flex items-center gap-3 mb-3">
                                    <img :src="`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${slot.pokemon.id}.png`"
                                        class="w-14 h-14 object-contain" style="image-rendering:pixelated;transform:scaleX(-1)" :alt="slot.pokemon.name">
                                    <div>
                                        <p class="font-black text-slate-800 capitalize text-sm" x-text="slot.pokemon.name"></p>
                                        <div class="flex gap-1 mt-1 flex-wrap">
                                            <template x-for="t in slot.pokemon.types" :key="t.type.name">
                                                <span class="px-2 py-0.5 rounded-full text-white text-[10px] font-bold capitalize"
                                                    :style="`background:${typeColor(t.type.name)}`"
                                                    x-text="t.type.name"></span>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <!-- Move selects -->
                                <div class="grid grid-cols-2 gap-2 mb-2">
                                    <template x-for="(_, mi) in [0,1,2,3]" :key="mi">
                                        <select class="text-xs border rounded-lg px-2 py-1.5 font-semibold text-slate-700 bg-white focus:outline-none transition-colors duration-200"
                                            :style="`border-color:${slot.selectedMoves[mi] ? typeColor(slot.selectedMoves[mi].type.name) : '#e2e8f0'}`"
                                            @change="selectMove('enemy', i, mi, $event.target.value)">
                                            <option value="">— Move —</option>
                                            <template x-for="mv in slot.moves" :key="mv.name">
                                                <option :value="mv.name"
                                                    :selected="slot.selectedMoves[mi]?.name === mv.name"
                                                    x-text="`${cap(mv.name.replace(/-/g,' '))} ${mv.power ? '('+mv.power+')' : ''}`"></option>
                                            </template>
                                        </select>
                                    </template>
                                </div>

                                <!-- Action buttons -->
                                <div class="flex gap-2">
                                    <button @click="bestMoves('enemy', i)"
                                        class="flex-1 text-xs font-bold px-2 py-1.5 rounded-lg bg-rose-50 text-rose-700 border border-rose-200 hover:bg-rose-100 transition">
                                        ⭐ Best
                                    </button>
                                    <button @click="randomMoves('enemy', i)"
                                        class="flex-1 text-xs font-bold px-2 py-1.5 rounded-lg bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100 transition">
                                        🎲 Random
                                    </button>
                                </div>
                            </div>
                        </template>

                        <!-- Loading indicator -->
                        <template x-if="slot.loading">
                            <div class="flex items-center gap-2 text-xs text-slate-400 font-semibold py-2">
                                <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-rose-500"></div>
                                Loading…
                            </div>
                        </template>
                    </div>
                </template>
            </section>

        </div>

    </main>

</div>
</body>

</html>
